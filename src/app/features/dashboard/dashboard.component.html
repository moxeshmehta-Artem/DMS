<div class="min-h-screen surface-ground">
    <!-- Content -->
    <div class="p-5">

        <!-- Menu Grid -->
        <div class="grid">
            <div class="col-12 md:col-6 lg:col-4" *ngFor="let item of menuItems">
                <div class="surface-card shadow-2 p-3 border-round cursor-pointer hover:shadow-4 hover:-translate-y-1 hover:bg-primary-50 transition-all transition-duration-300 border-left-3 border-primary"
                    (click)="navigateTo(item.routerLink)">
                    <div class="flex align-items-center mb-3">
                        <div class="flex align-items-center justify-content-center bg-primary-50 border-round mr-3"
                            style="width:3rem;height:3rem">
                            <i [class]="item.icon" class="text-xl text-primary"></i>
                        </div>
                        <span class="text-900 font-bold text-xl">{{ item.label }}</span>
                        <i class="pi pi-arrow-right ml-auto text-primary-300"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- FRONTDESK DASHBOARD -->
        <app-front-desk-dashboard *ngIf="isFrontdesk"></app-front-desk-dashboard>

        <!-- PATIENT DASHBOARD -->
        <app-patient-dashboard *ngIf="isPatient"></app-patient-dashboard>

        <!-- ADMIN DASHBOARD -->
        <app-admin-dashboard *ngIf="isAdmin"></app-admin-dashboard>

        <!-- DIETITIAN DASHBOARD -->
        <app-dietitian-dashboard *ngIf="isDietitian"></app-dietitian-dashboard>

        <!-- NO ROLE / GENERIC VIEW -->
        <div class="surface-card p-4 shadow-2 border-round mt-4"
            *ngIf="!isFrontdesk && !isPatient && !isAdmin && !isDietitian">
            <div class="text-2xl font-medium text-900 mb-3">Welcome to your Dashboard</div>
            <p class="text-600 line-height-3 mb-4">
                You are logged in as <strong>{{ currentUser()?.username }}</strong>.
                Below are the features you have permission to access:
            </p>

            <div class="flex flex-wrap gap-2">
                <p-chip *ngIf="permissions.canRegisterPatient" label="Register Patient" icon="pi pi-check"></p-chip>
                <p-chip *ngIf="permissions.canAddDietitian" label="Add Dietitian" icon="pi pi-check"></p-chip>
                <p-chip *ngIf="permissions.canViewPatients" label="View Patients" icon="pi pi-check"></p-chip>
                <p-chip *ngIf="permissions.canScheduleAppointment" label="Schedule Appointment"
                    icon="pi pi-check"></p-chip>
                <p-chip *ngIf="permissions.canAddDietPlan" label="Add Diet Plan" icon="pi pi-check"></p-chip>
                <p-chip *ngIf="permissions.canViewDoctors" label="View Doctors" icon="pi pi-check"></p-chip>
                <p-chip *ngIf="permissions.canViewDietPlan" label="View Diet Plan" icon="pi pi-check"></p-chip>
            </div>
            <ng-template #noPermissions>
                <p>No special permissions assigned.</p>
            </ng-template>
        </div>
    </div>
</div>
