<div class="surface-card p-4 shadow-2 border-round">
    <div class="flex align-items-center justify-content-between mb-4">
        <div class="text-2xl font-bold text-900">Active Appointments</div>
        <p-button icon="pi pi-refresh" [rounded]="true" [text]="true" (onClick)="loadPendingAppointments()"
            [loading]="isLoading"></p-button>
    </div>

    <p-table [value]="activeAppointments" [responsiveLayout]="'stack'" styleClass="p-datatable-sm" [paginator]="true"
        [rows]="5">
        <ng-template pTemplate="header">
            <tr>
                <th>Patient</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-appt>
            <tr>
                <td>
                    <span class="p-column-title font-bold">Patient</span>
                    {{ appt.patientName }}
                </td>
                <td>
                    <span class="p-column-title font-bold">Date</span>
                    {{ appt.appointmentDate | date:'mediumDate' }}
                </td>
                <td>
                    <span class="p-column-title font-bold">Status</span>
                    <p-tag [value]="appt.status" [severity]="appt.status | statusSeverity"></p-tag>
                </td>
                <td>
                    <span class="p-column-title font-bold">Actions</span>
                    <div class="flex gap-2" *ngIf="appt.status === 'PENDING'">
                        <p-button icon="pi pi-check" severity="success" [rounded]="true" [text]="true" pTooltip="Accept"
                            (onClick)="updateStatus(appt, 'CONFIRMED')"></p-button>
                        <p-button icon="pi pi-times" severity="danger" [rounded]="true" [text]="true" pTooltip="Reject"
                            (onClick)="updateStatus(appt, 'REJECTED')"></p-button>
                    </div>

                    <div class="flex gap-2" *ngIf="appt.status === 'CONFIRMED'">
                        <p-button label="Create Plan" icon="pi pi-book" severity="info" [rounded]="true" [text]="true"
                            pTooltip="Create Diet Plan" (onClick)="openDietPlan(appt)"></p-button>
                        <p-button label="Complete" icon="pi pi-check-circle" severity="help" [rounded]="true"
                            [text]="true" pTooltip="Mark as Completed"
                            (onClick)="updateStatus(appt, 'COMPLETED')"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="4" class="text-center p-4 text-600">
                    <i class="pi pi-calendar-check text-4xl mb-3 block text-primary"></i>
                    No active appointments.
                </td>
            </tr>
        </ng-template>
    </p-table>

    <!-- DIET PLAN DIALOG -->
    <p-dialog [(visible)]="displayDietPlanDialog" header="Create Diet Plan" [modal]="true" [style]="{width: '600px'}">
        <div class="flex flex-column gap-3 pt-2">
            <label class="font-bold">Plan Details for {{ selectedAppt?.patientName }}</label>
            <div class="grid p-fluid">
                <div class="col-12 md:col-6">
                    <label class="block mb-2 font-bold">Breakfast <span class="text-red-500">*</span></label>
                    <textarea pInputTextarea [(ngModel)]="newPlan.breakfast" rows="3"
                        placeholder="Oats, Eggs..."></textarea>
                </div>
                <div class="col-12 md:col-6">
                    <label class="block mb-2 font-bold">Lunch <span class="text-red-500">*</span></label>
                    <textarea pInputTextarea [(ngModel)]="newPlan.lunch" rows="3"
                        placeholder="Salad, Chicken..."></textarea>
                </div>
                <div class="col-12 md:col-6">
                    <label class="block mb-2 font-bold">Dinner <span class="text-red-500">*</span></label>
                    <textarea pInputTextarea [(ngModel)]="newPlan.dinner" rows="3"
                        placeholder="Soup, Fish..."></textarea>
                </div>
                <div class="col-12 md:col-6">
                    <label class="block mb-2 font-bold">Snacks</label>
                    <textarea pInputTextarea [(ngModel)]="newPlan.snacks" rows="3"
                        placeholder="Nuts, Fruits..."></textarea>
                </div>
            </div>
        </div>
        <ng-template pTemplate="footer">
            <p-button label="Save & Complete" icon="pi pi-check" (onClick)="saveDietPlan()"
                [disabled]="!isPlanValid"></p-button>
        </ng-template>
    </p-dialog>
</div>
